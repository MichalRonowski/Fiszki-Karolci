<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Fiszki Karolci</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="card-stage" aria-label="Pojedyncza fiszka">
      <div class="flashcard-progress" aria-live="polite" aria-atomic="true">
        <span class="flashcard-progress__current" id="progressCurrent">1</span>
        <span class="flashcard-progress__divider">/</span>
        <span class="flashcard-progress__total" id="progressTotal">4</span>
      </div>
      <div class="flashcard-empty-state" id="emptyState" hidden>
        Brak fiszek. Dodaj nowe słówka poniżej!
      </div>
      <div class="flashcard" id="flashcard" role="button" tabindex="0" aria-pressed="false" aria-label="Kliknij, aby odwrócić fiszkę">
        <div class="flashcard__inner">
          <article class="flashcard__face flashcard__face--front">
            <p class="flashcard__label">Pytanie</p>
            <h1 class="flashcard__content">Jak po angielsku jest „kot”?</h1>
            <p class="flashcard__hint">Kliknij, aby zobaczyć odpowiedź</p>
          </article>
          <article class="flashcard__face flashcard__face--back">
            <p class="flashcard__label">Odpowiedź</p>
            <h1 class="flashcard__content">Cat</h1>
            <p class="flashcard__hint">Kliknij ponownie, aby wrócić</p>
          </article>
        </div>
      </div>
      <div class="flashcard-controls" aria-label="Nawigacja fiszek">
        <button class="control-button" id="prevBtn" type="button">Poprzednia</button>
        <button class="control-button control-button--primary" id="nextBtn" type="button">Następna</button>
        <button class="control-button" id="shuffleBtn" type="button">Wymieszaj fiszki</button>
      </div>

      <div class="flashcard-danger-actions">
        <button class="control-button control-button--danger" id="deleteBtn" type="button">Usuń tę fiszkę</button>
      </div>

      <section class="flashcard-form-panel" aria-labelledby="customFlashcardTitle">
        <div class="flashcard-form-panel__header">
          <h2 class="flashcard-form-panel__title" id="customFlashcardTitle">Dodaj własną fiszkę</h2>
          <p class="flashcard-form-panel__text">Uzupełnij oba pola, a nowa fiszka zostanie zapisana w przeglądarce.</p>
        </div>
        <form class="flashcard-form" id="addFlashcardForm">
          <label class="flashcard-form__field">
            <span class="flashcard-form__label">Pytanie</span>
            <textarea class="flashcard-form__input" id="newQuestion" name="question" rows="2" placeholder="Np. Jak po angielsku jest 'stół'?" required></textarea>
          </label>
          <label class="flashcard-form__field">
            <span class="flashcard-form__label">Odpowiedź</span>
            <textarea class="flashcard-form__input" id="newAnswer" name="answer" rows="2" placeholder="Np. Table" required></textarea>
          </label>
          <button class="control-button control-button--primary flashcard-form__submit" type="submit">Dodaj fiszkę</button>
        </form>
      </section>
    </section>
  </main>
</body>
</html>
